name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge new issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            // Auto-label based on title prefix
            const labels = [];

            if (title.startsWith('[bug]')) {
              labels.push('bug');
              // Try to categorize the bug
              if (body.includes('backend') || body.includes('ai ') || body.includes('server') || body.includes('timeout')) {
                labels.push('backend-bug');
              } else if (body.includes('map') || body.includes('ui') || body.includes('crash') || body.includes('screen')) {
                labels.push('ios-bug');
              }
              if (body.includes('ai-generated') || body.includes('wrong location') || body.includes('suggestion')) {
                labels.push('ai-response');
              }
            }

            if (title.startsWith('[feature]')) {
              labels.push('enhancement');
            }

            // Check severity
            if (body.includes('critical - app crashes')) {
              labels.push('priority-high');
            }

            // Add labels if any were determined
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

            // Post triage acknowledgment
            const isBug = title.startsWith('[bug]');
            const isFeature = title.startsWith('[feature]');

            let message = '';
            if (isBug) {
              message = `Thanks for reporting this bug! 🔍

            **Triage Summary:**
            - Issue has been automatically labeled and queued for review
            - A team member will investigate within **48 hours**

            **While you wait:**
            - Make sure you've included your iPhone model, iOS version, and the trip query that triggered the issue
            - If you can reproduce the bug consistently, additional details about the steps help us fix it faster

            *This is an automated triage response. A human will follow up shortly.*`;
            } else if (isFeature) {
              message = `Thanks for the feature suggestion! 💡

            **What happens next:**
            - Your request will be reviewed within **1 week**
            - Popular requests get prioritized — if others want this too, they can add a 👍 reaction

            *This is an automated triage response. A human will follow up shortly.*`;
            } else {
              message = `Thanks for reaching out! 📬

            Your issue has been received and will be reviewed within **72 hours**.

            *This is an automated triage response. A human will follow up shortly.*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            });

      - name: Assign to maintainer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['fabianwilliams']
            });
