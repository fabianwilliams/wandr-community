name: Claude Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot')
    concurrency:
      group: issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude for Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_non_write_users: "*"
          show_full_output: false
          allowed_tools: "Bash(gh issue *),Bash(gh label *),Bash(gh search *),Read,Glob,Grep"
          prompt: |
            You are the issue triage assistant for the WandR community repository.
            WandR is an AI-powered trip planner iOS app that plans exploration routes
            from natural language queries.

            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}
            AUTHOR: ${{ github.event.issue.user.login }}
            EVENT: ${{ github.event_name }}

            If this is a NEW issue (event = issues), perform full triage:

            1. **Review available labels**: Run `gh label list --json name,description`
               to see what labels exist.

            2. **Check for duplicates**: Run `gh issue list --state open --limit 30 --json number,title,labels`
               to find potentially duplicate or related issues.

            3. **Classify and label**: Based on the issue content, apply appropriate labels using
               `gh issue edit ${{ github.event.issue.number }} --add-label "label1" --add-label "label2"`.
               Common classifications:
               - Bug reports: `bug` + one of `backend-bug`, `ios-bug`, or `ai-response`
               - Feature requests: `enhancement`
               - Questions: `question`
               - If it looks like a duplicate, add `duplicate`
               - If more info is needed, add `needs-info`
               - Assess severity: `priority-high` or `priority-low` if clear

            4. **Post a triage comment**: Write a brief, friendly comment that:
               - Acknowledges the issue
               - Notes if it relates to any known issues
               - For bugs: mentions expected response time (48 hours)
               - For features: mentions review timeline (1 week)
               - For questions: mentions response time (72 hours)
               - If the issue matches a known bug (Dunkin Donuts in restaurant results,
                 multi-destination navigation limitation, AI locations may be outdated),
                 reference the relevant existing issue
               - Sign off as the automated triage assistant

            5. **Do NOT close issues** — only label and comment.
            6. **Do NOT assign issues** — the maintainer will assign manually.

            If this is a COMMENT on an existing issue (event = issue_comment), only respond
            if the comment asks a question or requests help. Keep responses brief and helpful.
            If the commenter is just providing additional info, do not respond.

            Keep all responses concise, professional, and friendly. You represent the WandR project.
